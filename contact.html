    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3rem;
        }

        .contact-info {
            background: var(--accent);
            color: white;
            padding: 3rem 2rem;
            border-radius: var(--radius-lg);
        }

        .contact-info h2 {
            color: white;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .info-item i {
            font-size: 1.5rem;
            margin-right: 1rem;
            width: 30px;
            text-align: center;
        }

        .info-item p {
            margin: 0;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .info-item a {
            color: white;
            text-decoration: none;
        }

        .info-item a:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-color);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(116, 168, 164, 0.15);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Main Content -->
    <main style="flex: 1;">
        <section class="section">
            <div class="container">
                <h1 class="section-title">Get In Touch</h1>

                <div class="card" style="padding: 2rem;">
                    <div class="contact-grid">

                        <!-- Contact Information -->
                        <div class="contact-info">
                            <h2>Contact Info</h2>

                            <div class="info-item">
                                <i class="fas fa-envelope"></i>
                                <div>
                                    <p>Email</p>
                                    <a href="mailto:txo1028@mavs.uta.edu">txo1028@mavs.uta.edu</a>
                                    <a href="mailto:tahmidhasan.oni@uta.edu">tahmidhasan.oni@uta.edu</a>
                                    <a href="mailto:oni144b@gmail.com">oni144b@gmail.com</a>
                                </div>
                            </div>

                            <!-- <div class="info-item">
                                <i class="fas fa-phone-alt"></i>
                                <div>
                                    <p>Phone</p>
                                    <a href="tel:+1234567890">+1 (234) 567-890</a>
                                </div>
                            </div> -->

                            <div class="info-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <div>
                                    <p>Location</p>
                                    <p>Arlington, TX, USA</p>
                                </div>
                            </div>
                        </div>

                        <!-- Contact Form -->
                        <div class="contact-form-container">
                            <form action="#" method="POST"
                                onsubmit="event.preventDefault(); alert('Message feature requires backend setup. Currently in demo mode.');">
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label class="form-label" for="firstName">First Name</label>
                                        <input type="text" id="firstName" class="form-control" required
                                            placeholder="First name">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="lastName">Last Name</label>
                                        <input type="text" id="lastName" class="form-control" required
                                            placeholder="Last name">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="email">Email Address</label>
                                    <input type="email" id="email" class="form-control" required
                                        placeholder="jane@example.com">
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="subject">Subject</label>
                                    <input type="text" id="subject" class="form-control" required
                                        placeholder="How can I help you?">
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="message">Message</label>
                                    <textarea id="message" class="form-control" required
                                        placeholder="Your message here..."></textarea>
                                </div>

                                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                            </form>
                        </div>

                    </div>
                </div>

            </div>
        </section>
